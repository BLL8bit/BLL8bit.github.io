<!DOCTYPE html>
<html>
<head>
    <title>BLL | Solitaire</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        body { background: #2d5a27; color: white; }
        .card { width: 60px; height: 90px; background: white; border-radius: 5px; color: black; display: inline-block; margin: 10px; border: 2px solid #000; padding: 5px; cursor: move; }
        .red { color: red; }
    </style>
</head>
<body>
    <h1>SOLITAIRE</h1>
    <div id="deck">
        <div class="card red">A ♥</div>
        <div class="card">K ♠</div>
        <div class="card red">10 ♦</div>
        <div class="card">Q ♣</div>
    </div>
    <p>Перетаскивай карты (в разработке...)</p>
</body>
</html>
