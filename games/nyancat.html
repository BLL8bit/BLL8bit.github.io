<!DOCTYPE html>
<html>
<head>
    <title>BLL | Nyan Space</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        body { background: #003366; overflow: hidden; }
        .cat { position: absolute; top: 50%; left: 100px; font-size: 50px; animation: wave 0.5s infinite alternate; }
        .rainbow { position: absolute; height: 40px; background: linear-gradient(to bottom, red, orange, yellow, green, blue, purple); top: 50.5%; left: 0; width: 100px; }
        @keyframes wave { from { transform: translateY(0); } to { transform: translateY(-20px); } }
    </style>
</head>
<body>
    <h1>NYAN BLL</h1>
    <div class="rainbow"></div>
    <div class="cat">🐈💨🌈</div>
    <p style="color: white; margin-top: 300px;">БЕСКОНЕЧНЫЙ ПОЛЕТ...</p>
</body>
</html>
