<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BLL | Casino</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .slot-machine {
            background: #222;
            padding: 30px;
            border: 8px solid #ff0000;
            border-radius: 20px;
            box-shadow: 0 0 30px #ff0000;
            margin-top: 50px;
        }
        .reels {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .reel {
            width: 100px;
            height: 120px;
            background: white;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            overflow: hidden;
            position: relative;
        }
        .spinning { animation: blur 0.1s infinite alternate; }
        @keyframes blur { from { filter: blur(0); } to { filter: blur(5px); } }
        
        button {
            padding: 15px 30px;
            font-family: 'Courier New';
            font-weight: bold;
            background: #ff0000;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body style="align-items: center; justify-content: center; display: flex; flex-direction: column;">
    <h1 style="color: #ff0000; text-shadow: 0 0 10px #000;">BLL CASINO</h1>
    
    <div class="slot-machine">
        <div class="reels">
            <div id="r1" class="reel">💎</div>
            <div id="r2" class="reel">💎</div>
            <div id="r3" class="reel">💎</div>
        </div>
        <button onclick="spin()">ДЕРНУТЬ РЫЧАГ</button>
    </div>
    
    <p id="status" style="margin-top: 20px; font-weight: bold;"></p>
    <a href="../index.html" style="margin-top: 30px; color: #000;">ВЕРНУТЬСЯ В ХАБ</a>

    <script>
        const symbols = ['🍎', '🍒', '🍋', '7️⃣', '💀', '💎'];
        function spin() {
            const reels = [document.getElementById('r1'), document.getElementById('r2'), document.getElementById('r3')];
            reels.forEach(r => r.classList.add('spinning'));
            document.getElementById('status').innerText = "КРУТИМ...";

            setTimeout(() => {
                const results = reels.map(r => {
                    r.classList.remove('spinning');
                    const res = symbols[Math.floor(Math.random() * symbols.length)];
                    r.innerText = res;
                    return res;
                });

                if (results[0] === results[1] && results[1] === results[2]) {
                    document.getElementById('status').innerText = "ДЖЕКПОТ!";
                    document.getElementById('status').style.color = "gold";
                } else {
                    document.getElementById('status').innerText = "ПОПРОБУЙ ЕЩЕ";
                    document.getElementById('status').style.color = "black";
                }
            }, 1000);
        }
    </script>
</body>
</html>
